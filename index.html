<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог товаров</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .cart-badge { position: absolute; top: -5px; right: -5px; background: #10b981; color: #064e3b; border-radius: 9999px; font-size: 0.7rem; width: 1.2rem; height: 1.2rem; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 100; }
    .modal.active { display: flex; }
    .spinner { border: 3px solid #374151; border-top: 3px solid #34d399; border-radius: 50%; width: 2rem; height: 2rem; animation: spin 1s linear infinite; margin: 2rem auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .product-card { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .qty-control { display: flex; align-items: center; border: 1px solid #374151; border-radius: 0.5rem; overflow: hidden; background: #111827; }
    .qty-btn { background: #1f2937; color: #e5e7eb; border: none; width: 2rem; height: 2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; user-select: none; transition: background 0.2s; }
    .qty-btn:hover { background: #374151; }
    .qty-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .qty-input { width: 2.5rem; text-align: center; background: transparent; border: none; color: white; font-size: 0.9rem; font-weight: 500; -moz-appearance: textfield; padding: 0; }
    .qty-input::-webkit-outer-spin-button, .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .cat-btn.active { background: #10b981 !important; color: #064e3b !important; border-color: #34d399 !important; font-weight: bold; }
  </style>
</head>
<body class="bg-black text-gray-100 font-sans antialiased">

<!-- ШАПКА -->
<header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50 shadow-xl">
  <div class="max-w-6xl mx-auto px-3 py-2 flex items-center gap-2">
    
    <!-- 1. Категории (скролл, занимает всё свободное место) -->
    <nav class="flex-1 overflow-x-auto whitespace-nowrap flex gap-2 no-scrollbar py-1">
      <button onclick="filterCategory('all', this)" class="cat-btn active bg-emerald-500 hover:bg-emerald-400 text-gray-900 px-3 py-1.5 rounded-md whitespace-nowrap transition text-sm font-medium border border-emerald-400">Все</button>
      <button onclick="filterCategory('Уход и гигиена', this)" class="cat-btn bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-md whitespace-nowrap transition text-sm font-medium border border-gray-700">Уход и гигиена</button>
      <button onclick="filterCategory('Парфюмерия', this)" class="cat-btn bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-md whitespace-nowrap transition text-sm font-medium border border-gray-700">Парфюмерия</button>
      <button onclick="filterCategory('Декоративная косметика', this)" class="cat-btn bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-md whitespace-nowrap transition text-sm font-medium border border-gray-700">Декор. косметика</button>
      <button onclick="filterCategory('Непрофильный товар', this)" class="cat-btn bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-md whitespace-nowrap transition text-sm font-medium border border-gray-700">Непрофильное</button>
      <button onclick="filterCategory('Аксессуары', this)" class="cat-btn bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-md whitespace-nowrap transition text-sm font-medium border border-gray-700">Аксессуары</button>
      <button onclick="filterCategory('Бытовая химия', this)" class="cat-btn bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-md whitespace-nowrap transition text-sm font-medium border border-gray-700">Бытовая химия</button>
    </nav>

    <!-- 2. Поиск (строго между категориями и корзиной) -->
    <div class="relative w-28 sm:w-36 md:w-48 shrink-0">
      <div class="absolute inset-y-0 left-0 flex items-center pl-2 pointer-events-none">
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>
      <input type="text" id="searchInput" placeholder="Поиск..." class="block w-full p-2 pl-8 text-sm text-white border border-gray-700 rounded-lg bg-gray-800 focus:ring-emerald-500 focus:border-emerald-500 placeholder-gray-500">
    </div>

    <!-- 3. Корзина -->
    <button onclick="openCart()" class="relative p-2 bg-gray-800 hover:bg-gray-700 rounded-lg transition shrink-0 border border-gray-700">
      <span class="text-xl">🛒</span>
      <span id="cartBadge" class="absolute -top-1 -right-1 bg-emerald-500 text-black text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden min-w-[18px] text-center">0</span>
    </button>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-6 min-h-screen">
  <div id="loading" class="text-center py-20">
    <div class="spinner"></div>
    <p class="text-gray-400 mt-4 text-sm">Загрузка товаров...</p>
  </div>
  <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 hidden"></div>
  
  <!-- ПАГИНАЦИЯ -->
  <div id="pagination" class="mt-8 mb-10 flex justify-center items-center gap-2 flex-wrap"></div>
  
  <div id="error" class="text-center text-red-400 py-10 hidden">
    <p class="text-lg">⚠️ Не удалось загрузить товары</p>
    <p class="text-sm text-gray-500 mt-2">Проверьте файл products.json</p>
  </div>
</main>

<!-- КОРЗИНА -->
<div id="cartModal" class="modal">
  <div class="bg-gray-900 border border-gray-800 rounded-xl shadow-2xl w-full max-w-lg mx-4 p-5 max-h-[85vh] overflow-y-auto relative">
    <div class="flex justify-between items-center mb-5 border-b border-gray-800 pb-3">
      <h2 class="text-xl font-bold text-white flex items-center gap-2">🛒 Корзина <span id="cartCount" class="text-sm text-gray-400 font-normal"></span></h2>
      <button onclick="closeCart()" class="text-gray-400 hover:text-white text-2xl w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-800 transition">&times;</button>
    </div>
    <div id="cartItems" class="space-y-3 mb-6"></div>
    <div id="cartEmpty" class="text-center text-gray-500 py-8 hidden">Корзина пуста 😔</div>
    <button id="checkoutBtn" onclick="openCheckout()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-gray-900 py-3.5 rounded-xl font-bold text-lg transition shadow-lg shadow-emerald-900/20 hidden">Оформить заказ</button>
  </div>
</div>

<!-- ОФОРМЛЕНИЕ -->
<div id="checkoutModal" class="modal">
  <div class="bg-gray-900 border border-gray-800 rounded-xl shadow-2xl w-full max-w-md mx-4 p-6 relative">
    <button onclick="closeCheckout()" class="absolute top-4 right-4 text-gray-500 hover:text-white transition">&times;</button>
    <h2 class="text-xl font-bold text-white mb-6 border-b border-gray-800 pb-3">Оформление</h2>
    <form id="orderForm" class="space-y-4">
      <div><label class="block text-xs text-gray-400 mb-1 ml-1">Имя *</label><input type="text" name="name" placeholder="Как к вам обращаться?" required class="w-full px-4 py-3 bg-gray-800 border border-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"></div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-xs text-gray-400 mb-1 ml-1">Телефон</label><input type="tel" name="phone" placeholder="+7 (999)..." class="w-full px-4 py-3 bg-gray-800 border border-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"></div>
        <div><label class="block text-xs text-gray-400 mb-1 ml-1">Telegram</label><input type="text" name="telegram" placeholder="@username" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"></div>
      </div>
      <input type="text" name="surname" placeholder="Фамилия (необязательно)" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition">
      <input type="text" name="website" class="hidden opacity-0 absolute" tabindex="-1" autocomplete="off">
      <button type="submit" id="submitBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-gray-900 py-3.5 rounded-lg font-bold transition mt-2">Отправить в Telegram</button>
    </form>
    <p id="formStatus" class="mt-3 text-sm text-center hidden font-medium"></p>
  </div>
</div>

<script>
let products = [];
let cart = JSON.parse(localStorage.getItem('shopCart')) || [];
let currentCategory = 'all';
let currentPage = 1;
let searchQuery = "";
const itemsPerPage = 20;

// Слушаем ввод в поиске
document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value.toLowerCase().trim();
    currentPage = 1;
    renderProducts();
});

async function loadProducts() {
  try {
    const res = await fetch('products.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    products = await res.json();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('productsGrid').classList.remove('hidden');
    renderProducts();
  } catch (err) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error').classList.remove('hidden');
    console.error(err);
  }
}

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  
  // 1. Фильтр по категории
  let filtered = currentCategory === 'all' ? products : products.filter(p => p.category === currentCategory);

  // 2. Фильтр по поиску (только по названию)
  if (searchQuery) {
      filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery));
  }

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-20 text-lg">Ничего не найдено 😔</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const totalPages = Math.ceil(filtered.length / itemsPerPage);
  if (currentPage > totalPages) currentPage = 1;

  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const pageItems = filtered.slice(start, end);

  grid.innerHTML = pageItems.map(p => {
    const outOfStock = p.stock <= 0;
    const discount = p.retail_price - p.our_price;
    let stockHtml = '';
    if (outOfStock) stockHtml = '<span class="text-xs text-red-400 font-medium">Нет в наличии</span>';
    else if (p.stock <= 2) stockHtml = `<span class="text-xs text-amber-400 font-medium">🔥 Осталось: ${p.stock} шт.</span>`;
    else stockHtml = `<span class="text-xs text-gray-400">В наличии: ${p.stock} шт.</span>`;

    return `
    <div class="product-card bg-gray-900 border border-gray-800 rounded-xl hover:border-gray-600 transition flex flex-col h-full relative overflow-hidden group">
      <div class="aspect-square bg-gray-950 p-4 flex items-center justify-center relative">
        <img src="${p.img}" alt="${p.name}" class="max-h-full max-w-full object-contain transition duration-300 group-hover:scale-105">
        ${outOfStock ? '<div class="absolute inset-0 bg-black/60 flex items-center justify-center"><span class="bg-red-500 text-white text-xs px-2 py-1 rounded font-bold">НЕТ В НАЛИЧИИ</span></div>' : ''}
      </div>
      <div class="p-3 flex flex-col flex-1">
        <div class="h-14 mb-2 overflow-hidden"><h3 class="text-sm font-semibold text-white leading-tight line-clamp-2">${p.name}</h3></div>
        <div class="h-12 mb-2 flex flex-col justify-center space-y-0.5">
          <div class="flex justify-between items-center text-xs"><span class="text-gray-400">Розничная цена:</span><span class="line-through text-gray-500">${p.retail_price.toLocaleString('ru-RU')} ₽</span></div>
          <div class="flex justify-between items-center font-bold"><span class="text-emerald-400 text-xs">Наша цена:</span><span class="text-emerald-300 text-base">${p.our_price.toLocaleString('ru-RU')} ₽</span></div>
        </div>
        <div class="h-6 mb-2 flex items-center">${discount > 0 ? `<span class="bg-emerald-900/40 text-emerald-400 text-[10px] font-bold px-2 py-0.5 rounded-full w-full text-center">Выгода ${discount.toLocaleString('ru-RU')} ₽</span>` : '<span class="text-[10px] text-gray-600 w-full text-center">—</span>'}</div>
        <div class="h-6 mb-2 flex items-center">${stockHtml}</div>
        <div class="mt-auto flex gap-2 items-center">
          <div class="qty-control ${outOfStock ? 'opacity-50' : ''}">
            <button type="button" class="qty-btn" onclick="changeQty(${p.id}, -1, ${p.stock})" ${outOfStock ? 'disabled' : ''}>−</button>
            <input type="text" id="qty-${p.id}" value="1" min="1" max="${p.stock}" class="qty-input" ${outOfStock ? 'disabled' : ''} oninput="validateQty(this, ${p.stock})">
            <button type="button" class="qty-btn" onclick="changeQty(${p.id}, 1, ${p.stock})" ${outOfStock ? 'disabled' : ''}>+</button>
          </div>
          <button onclick="addToCart(${p.id})" class="flex-1 ${outOfStock ? 'bg-gray-700 text-gray-500 cursor-not-allowed' : 'bg-emerald-500 hover:bg-emerald-400 text-gray-900 shadow-lg shadow-emerald-900/20'} text-sm font-bold py-2 rounded-lg transition" ${outOfStock ? 'disabled' : ''}>${outOfStock ? 'Нет' : 'В корзину'}</button>
        </div>
      </div>
    </div>`;
  }).join('');

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const container = document.getElementById('pagination');
  if (totalPages <= 1) { container.innerHTML = ''; return; }

  let html = '';
  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, currentPage + 2);

  if (startPage > 1) {
    html += `<button onclick="changePage(1)" class="px-3 py-1.5 rounded-md text-sm bg-gray-800 text-gray-300 hover:bg-gray-700 border border-gray-700 transition">1</button>`;
    if (startPage > 2) html += `<span class="text-gray-500 px-1">…</span>`;
  }
  
  for (let i = startPage; i <= endPage; i++) {
    const activeClass = i === currentPage 
      ? "bg-emerald-500 text-gray-900 font-bold border border-emerald-400" 
      : "bg-gray-800 text-gray-300 hover:bg-gray-700 border border-gray-700";
    html += `<button onclick="changePage(${i})" class="px-3 py-1.5 rounded-md text-sm transition select-none ${activeClass}">${i}</button>`;
  }
  
  if (endPage < totalPages) {
    if (endPage < totalPages - 1) html += `<span class="text-gray-500 px-1">…</span>`;
    html += `<button onclick="changePage(${totalPages})" class="px-3 py-1.5 rounded-md text-sm bg-gray-800 text-gray-300 hover:bg-gray-700 border border-gray-700 transition">${totalPages}</button>`;
  }
  container.innerHTML = html;
}

function changePage(page) {
  const filtered = currentCategory === 'all' ? products : products.filter(p => p.category === currentCategory);
  const finalFiltered = searchQuery ? filtered.filter(p => p.name.toLowerCase().includes(searchQuery)) : filtered;
  
  const totalPages = Math.ceil(finalFiltered.length / itemsPerPage);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderProducts();
  document.getElementById('productsGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function changeQty(id, delta, maxStock) {
  const input = document.getElementById(`qty-${id}`);
  let val = parseInt(input.value) || 1;
  input.value = Math.max(1, Math.min(maxStock, val + delta));
}
function validateQty(input, maxStock) {
  let val = parseInt(input.value) || 1;
  input.value = Math.max(1, Math.min(maxStock, val));
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  if (!product || product.stock <= 0) return;
  const input = document.getElementById(`qty-${id}`);
  const qty = parseInt(input.value) || 1;
  const existing = cart.find(i => i.id === id);
  const alreadyInCart = existing ? existing.qty : 0;
  if (alreadyInCart + qty > product.stock) return alert(`⚠️ В корзине уже ${alreadyInCart} шт. Остаток: ${product.stock}. Больше нельзя.`);
  if (existing) existing.qty += qty;
  else cart.push({ id: product.id, name: product.name, price: product.our_price, qty });
  saveCart();
  const btn = document.activeElement;
  if(btn) { btn.textContent = '✓'; setTimeout(() => btn.textContent = 'В корзину', 800); }
}

function saveCart() { localStorage.setItem('shopCart', JSON.stringify(cart)); updateBadge(); }
function updateBadge() {
  const total = cart.reduce((sum, i) => sum + i.qty, 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = total;
  badge.classList.toggle('hidden', total === 0);
  document.getElementById('cartCount').textContent = total > 0 ? `(${total})` : '';
}
function openCart() { renderCartItems(); document.getElementById('cartModal').classList.add('active'); }
function closeCart() { document.getElementById('cartModal').classList.remove('active'); }

function renderCartItems() {
  const container = document.getElementById('cartItems');
  const empty = document.getElementById('cartEmpty');
  const btn = document.getElementById('checkoutBtn');
  if (cart.length === 0) { container.innerHTML = ''; empty.classList.remove('hidden'); btn.classList.add('hidden'); return; }
  empty.classList.add('hidden'); btn.classList.remove('hidden');
  let total = 0;
  container.innerHTML = cart.map(i => {
    const sum = i.price * i.qty; total += sum;
    return `<div class="flex justify-between items-center bg-gray-800/50 p-3 rounded-lg border border-gray-800"><div class="flex-1 pr-3"><p class="text-sm font-medium text-white line-clamp-1">${i.name}</p><p class="text-xs text-gray-400">${i.price} ₽ × ${i.qty}</p></div><div class="text-right"><p class="font-bold text-emerald-400 text-sm">${sum} ₽</p><button onclick="removeFromCart(${i.id})" class="text-[10px] text-red-400 hover:text-red-300 mt-1 underline">Удалить</button></div></div>`;
  }).join('') + `<div class="flex justify-between items-center mt-4 pt-3 border-t border-gray-700"><span class="text-gray-400">Итого:</span><span class="text-xl font-bold text-white">${total.toLocaleString('ru-RU')} ₽</span></div>`;
}
function removeFromCart(id) { cart = cart.filter(i => i.id !== id); saveCart(); renderCartItems(); }

function openCheckout() { closeCart(); document.getElementById('checkoutModal').classList.add('active'); }
function closeCheckout() { document.getElementById('checkoutModal').classList.remove('active'); }

document.getElementById('orderForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const btn = document.getElementById('submitBtn');
  const formData = new FormData(this);
  
  btn.disabled = true;
  btn.textContent = 'Обработка...';
  
  // Отправляем в Netlify Function
  fetch('/.netlify/functions/submit-order', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name: formData.get('name'),
      surname: formData.get('surname'),
      telegram: formData.get('telegram'),
      phone: formData.get('phone'),
      items: cart
    })
  })
  .then(async response => {
    const data = await response.json();
    
    if (response.ok && data.success) {
      // Очищаем корзину
      cart = [];
      localStorage.removeItem('shopCart');
      updateBadge();
      closeCheckout();
      
      // Показываем toast
      showToast('✅ Заказ оформлен! Остатки обновлены.');
      
      // Перезагружаем товары с сервера (чтобы увидеть новые остатки)
      setTimeout(() => {
        loadProducts();
      }, 1000);
    } else {
      throw new Error(data.error || 'Ошибка отправки');
    }
  })
  .catch(error => {
    console.error('Error:', error);
    showToast('❌ Ошибка. Попробуйте позже.', '#ef4444', '#fee2e2');
  })
  .finally(() => {
    btn.disabled = false;
    btn.textContent = 'Оформить заказ';
  });
});

function filterCategory(cat, btn) {
  currentCategory = cat;
  currentPage = 1;
  searchQuery = "";
  document.getElementById('searchInput').value = "";
  
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.remove('active', 'bg-emerald-500', 'text-gray-900', 'border-emerald-400');
    b.classList.add('bg-gray-800', 'border-gray-700', 'text-gray-300');
  });
  btn.classList.add('active', 'bg-emerald-500', 'text-gray-900', 'border-emerald-400');
  btn.classList.remove('bg-gray-800', 'border-gray-700', 'text-gray-300');
  renderProducts();
}

loadProducts();
updateBadge();
</script>
</body>
</html>
